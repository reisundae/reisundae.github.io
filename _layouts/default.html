<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-inner">
      <h2 class="logo">✦ Campaign ✦</h2>

      <nav>
        <a href="{{ '/' | relative_url }}">🏠 Home</a>
        <a href="{{ '/rules' | relative_url }}">📜 Rules</a>

        {% if page.nav_links %}
          <div class="nav-section-title">📌 Quick Links</div>

          {% for item in page.nav_links %}
            <a href="{{ '/rules#' | append: item.anchor | relative_url }}">
              {{ item.title }}
            </a>
          {% endfor %}
        {% endif %}
      </nav>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="content">
    <div class="parchment">
      {{ content }}
    </div>
  </main>

</div>

</body>
</html>
